{% extends "base.html" %}
{% block content %}

<div class="login-container">

    <h1>長大掲示板</h1>

    <p class="error">{{error_message}}</p>

    <form method="POST">

        <input
            type="text"
            name="userid"
            placeholder="ユーザーID"
            value="{{userid}}"
        >

        <input
            type="password"
            name="password"
            placeholder="パスワード"
        >

        <input
            type="submit"
            value="ログイン"
        >

    </form>

    <a href="/signup" class="signup-btn">
        新しいアカウントを作成
    </a>

</div>

{% endblock %}
