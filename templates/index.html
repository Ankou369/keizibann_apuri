{%extends "base.html" %}
{% block content %}
<h1>画像掲示板</h1>

<h2>ようこそ {{ current_user.id }} さん</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="text"
           name="title"
           placeholder="タイトル">

    <br><br>

    <textarea name="comment"></textarea>

    <br><br>

    <input type="file" name="image">

    <br><br>

    <button type="submit">
        投稿
    </button>

</form>

<hr>

{% for post in posts %}
<div class="post">
    <h2>{{ post.title }}</h2>

    <p>{{ post.comment }}</p>

    <img src="/uploads/{{ post.image }}" width="300">
</div>
<hr>

{% endfor %}

{% endblock %}
